<!doctype html>
<html lang="en">
  <head>
    <!-- ========================================================
         PENGATURAN HALAMAN CONTACT
         Ubah judul tab browser dan deskripsi Google di bagian ini.
         ======================================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Contact Muhammad Sultan Malik for design projects."
    >
    <title>Sultan Malik - Contact</title>
    <link rel="stylesheet" href="./src/styles.css?v=20260626-achievement-gap-2">
  </head>

  <body data-page="contact">
    <div class="site-shell">
      <!-- HEADER DAN MENU: dibuat oleh src/common.js. -->
      <div id="site-header"></div>

      <main class="contact-page">
        <!-- ======================================================
             HERO CONTACT
             Ubah judul, intro, email, Behance, dan Instagram di sini.
             ====================================================== -->
        <section class="contact-hero">
          <div>
            <p class="eyebrow">LET'S WORK TOGETHER</p>

            <h1 id="contactHeadline">
              Got a project<br>
              in mind?
            </h1>

            <p class="lede" id="contactIntro">
              Tell me what you're building, where you need help, and what a
              successful outcome looks like.
            </p>

            <div class="contact-actions" aria-label="Contact links">
              <a
                class="contact-icon-button"
                id="contactEmail"
                href="mailto:sultanmlk41@gmail.com"
                aria-label="Send email"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 6h16v12H4z"></path>
                  <path d="m4 7 8 6 8-6"></path>
                </svg>
                <span>Email</span>
              </a>

              <a
                class="contact-icon-button"
                id="contactBehance"
                href="https://www.behance.net/sultanmlk_"
                aria-label="Open Behance profile"
              >
                <b>Be</b>
                <span>Behance</span>
              </a>

              <a
                class="contact-icon-button"
                id="contactInstagram"
                href="https://www.instagram.com/sultanmlk_/"
                aria-label="Open Instagram profile"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="5" y="5" width="14" height="14" rx="4"></rect>
                  <circle cx="12" cy="12" r="3.5"></circle>
                  <circle cx="16.6" cy="7.4" r="0.7"></circle>
                </svg>
                <span>Instagram</span>
              </a>
            </div>
          </div>

          <div class="contact-visual">
            <div class="contact-rock"></div>
          </div>
        </section>

        <!-- ======================================================
             DAFTAR LAYANAN YANG TERSEDIA
             ====================================================== -->
        <section class="contact-details">
          <p>AVAILABLE FOR</p>

          <div id="contactServices">
            <span>Brand Identity</span>
            <span>Packaging Design</span>
            <span>Editorial Design</span>
            <span>Digital Design</span>
            <span>Creative Direction</span>
          </div>

          <p>REMOTE & PROJECT-BASED</p>
        </section>
      </main>

      <!-- FOOTER: dibuat oleh src/common.js. -->
      <div id="site-footer"></div>
    </div>

    <!-- JAVASCRIPT HEADER, MENU MOBILE, DAN FOOTER -->
    <script type="module" src="./src/common.js"></script>
  </body>
</html>
